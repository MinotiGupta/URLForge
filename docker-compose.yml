version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: urlforge_db
    environment:
      POSTGRES_USER: urlforge
      POSTGRES_PASSWORD: urlforge
      POSTGRES_DB: urlforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urlforge_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: urlforge_backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://urlforge:urlforge@db:5432/urlforge
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: change-me-in-production
      BASE_URL: http://localhost
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  worker:
    build: ./backend
    container_name: urlforge_worker
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql://urlforge:urlforge@db:5432/urlforge
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app

  beat:
    build: ./backend
    container_name: urlforge_beat
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: urlforge_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  nginx:
    image: nginx:alpine
    container_name: urlforge_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
